<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="Star Wars: Битва флотов - пошаговая карточная стратегия">
    <title>⭐ Star Wars: Битва флотов | Пошаговая стратегия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(ellipse at 30% 40%, #030712 0%, #000000 100%);
            font-family: 'Segoe UI', 'Orbitron', 'Arial', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }

        /* Анимированные звезды */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(1px 1px at 80px 150px, #ffd700, rgba(0,0,0,0));
            background-size: 200px 200px, 300px 300px;
            background-repeat: repeat;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .game-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            border: 2px solid #fbbf24;
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.3);
            position: relative;
            z-index: 1;
        }

        /* Верхняя панель */
        .status-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            background: #0a0f1fcc;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 25px;
            border: 1px solid #fbbf24;
        }

        .info-card {
            background: #000000aa;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .info-value {
            font-size: 2rem;
            font-weight: 800;
            color: #fbbf24;
            min-width: 50px;
            text-align: center;
        }

        .end-round-btn {
            background: #7c2d12;
            border: none;
            padding: 8px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .end-round-btn:active { transform: scale(0.96); background: #9a3412;}

        /* Флоты */
        .fleets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 25px;
        }

        .fleet {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 32px;
            padding: 20px;
            border-top: 4px solid;
            backdrop-filter: blur(4px);
        }

        .fleet-republic { border-top-color: #3b82f6; }
        .fleet-cis { border-top-color: #ef4444; }

        .fleet-title {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .ship-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            padding: 14px;
            margin-bottom: 14px;
            border-left: 5px solid;
            transition: all 0.2s;
            cursor: pointer;
        }

        .ship-card.active-ship {
            background: linear-gradient(135deg, #2d4a6e, #1e3a5f);
            box-shadow: 0 0 0 2px #fbbf24, 0 0 20px gold;
        }

        .ship-card.disabled-ship {
            opacity: 0.6;
            filter: grayscale(0.3);
        }

        .ship-name {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .energy-badge {
            background: #2d2d2d;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .systems-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 10px 0;
            font-size: 0.7rem;
        }

        .system {
            background: #00000066;
            padding: 4px;
            border-radius: 10px;
            text-align: center;
        }

        .system.broken {
            background: #7f1a1a;
            text-decoration: line-through;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .action-btn {
            background: #334155;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .action-btn:active { transform: scale(0.95);}
        .action-btn.disabled { opacity: 0.4; cursor: not-allowed; background: #1e293b;}

        /* Лог */
        .combat-log {
            background: #000000aa;
            border-radius: 28px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 20px;
            border: 1px solid #fbbf2444;
        }

        .restart-btn {
            background: #b45309;
            border: none;
            padding: 10px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 15px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        .restart-btn:hover { background: #c2410c;}

        @media (max-width: 900px) {
            .fleets { grid-template-columns: 1fr; }
            .systems-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="status-bar">
        <div class="info-card">🌌 ДИСТАНЦИЯ: <span class="info-value" id="distanceValue">6</span></div>
        <div class="info-card">⚡ РАУНД: <span class="info-value" id="roundValue">1</span></div>
        <button class="end-round-btn" id="endRoundBtn">⏭️ ЗАВЕРШИТЬ РАУНД</button>
    </div>

    <div class="fleets">
        <div class="fleet fleet-republic">
            <div class="fleet-title">✨ ГАЛАКТИЧЕСКАЯ РЕСПУБЛИКА ✨</div>
            <div id="republicShips"></div>
        </div>
        <div class="fleet fleet-cis">
            <div class="fleet-title">⚙️ КОНФЕДЕРАЦИЯ НЕЗАВИСИМЫХ СИСТЕМ ⚙️</div>
            <div id="cisShips"></div>
        </div>
    </div>

    <div class="combat-log" id="combatLog">
        ⚡ СИСТЕМЫ АКТИВИРОВАНЫ. Выберите корабль и действие.<br>
        📡 Каждое действие тратит 1 Энергию. После исчерпания энергии всех кораблей раунд завершится.<br>
        🎯 Дистанция влияет на урон и шанс попадания!
    </div>
    
    <div style="display: flex; justify-content: center; margin-top: 15px;">
        <button class="restart-btn" id="restartBtn">🔄 НОВАЯ БИТВА</button>
    </div>
</div>

<script>
    // ==================== ДАННЫЕ КОРАБЛЕЙ ====================
    const SHIPS_DATA = {
        // Республика
        "Арквитенс": { side: "rep", class: "легкий", maxEnergy: 4, shields: 3, weapons: 3, engines: 4, hull: 6,
            special: { name: "Пробивной выстрел", cd: 0, cdMax: 1, effect: "pierce" },
            passive: "Уклонение 50% если не атаковал" },
        "Аккламатор": { side: "rep", class: "легкий", maxEnergy: 3, shields: 4, weapons: 4, engines: 4, hull: 8,
            special: { name: "Тактическая поддержка", cd: 0, cdMax: 1, effect: "buffAlly" },
            passive: "20% шанс двойного урона" },
        "Венатор": { side: "rep", class: "средний", maxEnergy: 2, shields: 5, weapons: 5, engines: 4, hull: 10,
            special: { name: "Прикрытие", cd: 0, cdMax: 2, effect: "cover" },
            passive: "Первый выстрел в раунде +1 урон" },
        "Центакс": { side: "rep", class: "средний", maxEnergy: 2, shields: 4, weapons: 6, engines: 5, hull: 11,
            special: { name: "Тяжелый залп", cd: 0, cdMax: 0, effect: "heavyShot" },
            passive: "Атака на дист.1 запрещает движение врагу" },
        "Мандатор": { side: "rep", class: "тяжелый", maxEnergy: 2, shields: 5, weapons: 9, engines: 7, hull: 17,
            special: { name: "Доп. щиты", cd: 0, cdMax: 3, effect: "bonusShield" },
            passive: "Дистанция ≤2 → +2 урона" },
        // КНС
        "Щедрый": { side: "cis", class: "легкий", maxEnergy: 3, shields: 4, weapons: 4, engines: 3, hull: 8,
            special: { name: "Продвинутый ремонт", cd: 0, cdMax: 1, effect: "betterRepair" },
            passive: "Если не чинил → +1 урон" },
        "Провидение": { side: "cis", class: "средний", maxEnergy: 2, shields: 5, weapons: 5, engines: 4, hull: 10,
            special: { name: "Системная атака", cd: 0, cdMax: 2, effect: "disable" },
            passive: "Если не двигался → +1 урон" },
        "Бунтарь": { side: "cis", class: "средний", maxEnergy: 2, shields: 3, weapons: 6, engines: 4, hull: 11,
            special: { name: "Двойной выстрел", cd: 0, cdMax: 1, effect: "doubleShot" },
            passive: "40% шанс игнорировать щиты при спец." },
        "Барышник": { side: "cis", class: "тяжелый", maxEnergy: 2, shields: 4, weapons: 6, engines: 5, hull: 14,
            special: { name: "Блокировка", cd: 0, cdMax: 2, effect: "block" },
            passive: "Если не тратил энергию → +1 щит союзнику" },
        "Покоритель": { side: "cis", class: "тяжелый", maxEnergy: 2, shields: 5, weapons: 5, engines: 6, hull: 16,
            special: { name: "Гравитационный толчок", cd: 0, cdMax: 1, effect: "push" },
            passive: "После спец. +2 урона" }
    };

    const FLEET_COMP = {
        rep: ["Арквитенс", "Аккламатор", "Венатор", "Центакс", "Мандатор"],
        cis: ["Щедрый", "Провидение", "Бунтарь", "Барышник", "Покоритель"]
    };

    // Глобальное состояние
    let game = {
        distance: 6,
        round: 1,
        ships: [],
        currentShipId: null,
        waitingTarget: null, // { type, attackerId, callback }
        logs: [],
        roundActive: true
    };

    function addLog(msg) {
        game.logs.unshift(`[Раунд ${game.round}] ${msg}`);
        if (game.logs.length > 25) game.logs.pop();
        const logDiv = document.getElementById("combatLog");
        if (logDiv) logDiv.innerHTML = game.logs.map(l => `📟 ${l}`).join("<br>");
    }

    function getShip(id) { return game.ships.find(s => s.id === id); }

    // Проверка окончания раунда
    function checkRoundEnd() {
        const anyEnergy = game.ships.some(s => s.hull > 0 && s.energy > 0);
        if (!anyEnergy && !game.waitingTarget) {
            addLog("⚡ Вся энергия исчерпана! Раунд завершён.");
            // Восстановление энергии
            game.ships.forEach(s => {
                if (s.hull > 0) {
                    s.energy = s.maxEnergy;
                    // Восстановление щитов раз в 2 раунда
                    if (game.round % 2 === 0 && s.shields < s.maxShields) {
                        s.shields = Math.min(s.maxShields, s.shields + 1);
                        addLog(`${s.name}: щиты восстановлены до ${s.shields}`);
                    }
                }
                // Сброс временных эффектов
                s.disabledMove = false;
                s.underCover = false;
                s.buffDamage = 0;
                s.noShootRest = false;
                if (s.special) s.special.cd = Math.max(0, s.special.cd - 1);
            });
            game.round++;
            game.distance = 6;
            game.currentShipId = null;
            game.waitingTarget = null;
            addLog(`🌌 НАЧАЛСЯ РАУНД ${game.round}. Дистанция сброшена до 6.`);
            render();
        }
    }

    // Выбор корабля
    function selectShip(shipId) {
        if (game.waitingTarget) { addLog("Сначала завершите текущее действие!"); return; }
        const ship = getShip(shipId);
        if (!ship || ship.hull <= 0) { addLog("Корабль уничтожен"); return; }
        if (ship.energy <= 0) { addLog("Нет энергии для действий!"); return; }
        game.currentShipId = shipId;
        addLog(`Выбран ${ship.name}. Выберите действие.`);
        render();
    }

    // Обработка действий
    function performAction(shipId, action) {
        if (game.waitingTarget) { addLog("Сначала завершите текущее действие"); return; }
        const ship = getShip(shipId);
        if (!ship || ship.hull <= 0) return;
        if (ship.energy <= 0) { addLog("Недостаточно энергии!"); return; }
        
        // Проверка систем
        if (action === "Атаковать" && ship.weapons <= 0) { addLog("Орудия уничтожены!"); return; }
        if (action === "Маневр" && ship.engines <= 0) { addLog("Двигатели уничтожены!"); return; }
        
        ship.energy--;
        
        switch(action) {
            case "Атаковать": startAttack(ship); break;
            case "Маневр": performManeuver(ship); break;
            case "Прикрытие": startCover(ship); break;
            case "Обход": performFlank(ship); break;
            case "Ремонт": startRepair(ship); break;
            case "Спец.умение": performSpecial(ship); break;
        }
        
        game.currentShipId = null;
        if (!game.waitingTarget) checkRoundEnd();
        render();
    }
    
    function startAttack(attacker) {
        game.waitingTarget = { type: "attack", attackerId: attacker.id };
        addLog(`${attacker.name} готов атаковать. Выберите вражеский корабль.`);
        render();
    }
    
    function performManeuver(ship) {
        let delta = (ship.class === "легкий") ? 2 : 1;
        let newDist = Math.max(1, game.distance - delta);
        game.distance = newDist;
        addLog(`${ship.name} маневрирует! Дистанция уменьшена до ${game.distance}.`);
    }
    
    function performFlank(ship) {
        ship.flankActive = true;
        addLog(`${ship.name} совершает обход, игнорируя прикрытие врага. Атака не производится.`);
    }
    
    function startRepair(ship) {
        game.waitingTarget = { type: "repair", attackerId: ship.id };
        addLog(`Выберите систему для ремонта: щиты, орудия, двигатели, корпус`);
        render();
    }
    
    function startCover(ship) {
        game.waitingTarget = { type: "cover", attackerId: ship.id };
        addLog(`Выберите союзного корабля для прикрытия.`);
        render();
    }
    
    function performSpecial(ship) {
        const spec = ship.special;
        if (!spec) { addLog("Нет спецумения"); return; }
        if (spec.cd > 0) { addLog(`Спецумение на перезарядке (${spec.cd} раундов)`); return; }
        
        switch(spec.effect) {
            case "pierce": ship.pierceActive = true; addLog(`${ship.name}: следующий выстрел пробивает щиты!`); spec.cd = spec.cdMax; break;
            case "buffAlly": game.waitingTarget = { type: "buffAlly", attackerId: ship.id }; return;
            case "cover": game.waitingTarget = { type: "coverAlly", attackerId: ship.id }; return;
            case "heavyShot": ship.heavyShot = true; addLog(`Тяжелый залп активен! +1 урон, дист.≤3`); break;
            case "bonusShield": ship.shields = Math.min(ship.maxShields + 2, ship.shields + 2); addLog(`Мандатор получает +2 временных щита!`); spec.cd = spec.cdMax; break;
            case "betterRepair": ship.betterRepair = true; addLog(`Следующий ремонт эффективнее!`); spec.cd = spec.cdMax; break;
            case "disable": game.waitingTarget = { type: "disable", attackerId: ship.id }; return;
            case "doubleShot": startDoubleShot(ship); spec.cd = spec.cdMax; return;
            case "block": game.waitingTarget = { type: "block", attackerId: ship.id }; return;
            case "push": game.waitingTarget = { type: "push", attackerId: ship.id }; return;
        }
        if (!game.waitingTarget) afterAction();
    }
    
    function startDoubleShot(ship) {
        game.waitingTarget = { type: "doubleShot", attackerId: ship.id, shots: 0 };
        addLog(`Двойной выстрел! Выберите первую цель.`);
        render();
    }
    
    // Обработка целей
    function resolveTarget(targetId) {
        if (!game.waitingTarget) return;
        const { type, attackerId, shots } = game.waitingTarget;
        const attacker = getShip(attackerId);
        if (!attacker) { cancelTarget(); return; }
        
        if (type === "attack") {
            const defender = getShip(targetId);
            if (!defender || defender.side === attacker.side) { addLog("Нельзя атаковать союзника!"); cancelTarget(); return; }
            resolveAttack(attacker, defender);
            cancelTarget();
        }
        else if (type === "repair") {
            const system = targetId;
            if (attacker[system] < attacker[`max${system.charAt(0).toUpperCase() + system.slice(1)}`]) {
                let amount = attacker.betterRepair ? 3 : 2;
                attacker[system] = Math.min(attacker[`max${system.charAt(0).toUpperCase() + system.slice(1)}`], attacker[system] + amount);
                addLog(`${attacker.name} восстанавливает ${system} на ${amount}.`);
                attacker.betterRepair = false;
            } else addLog("Система уже восстановлена");
            cancelTarget();
        }
        else if (type === "cover" || type === "coverAlly") {
            const ally = getShip(targetId);
            if (ally && ally.side === attacker.side) { ally.underCover = true; addLog(`${attacker.name} прикрывает ${ally.name}!`); }
            cancelTarget();
        }
        else if (type === "buffAlly") {
            const ally = getShip(targetId);
            if (ally && ally.side === attacker.side) { ally.buffDamage = (ally.buffDamage || 0) + 1; addLog(`${ally.name} получает +1 к урону!`); }
            cancelTarget();
        }
        else if (type === "disable") {
            const enemy = getShip(targetId);
            if (enemy && enemy.side !== attacker.side) {
                const systems = ["weapons", "engines"];
                const sys = systems[Math.floor(Math.random() * 2)];
                enemy.disabledSystem = sys;
                addLog(`${attacker.name} отключает ${sys === "weapons" ? "орудия" : "двигатели"} у ${enemy.name} на 1 раунд!`);
            }
            cancelTarget();
        }
        else if (type === "doubleShot") {
            const defender = getShip(targetId);
            if (!defender || defender.side === attacker.side) { addLog("Неверная цель"); cancelTarget(); return; }
            resolveAttack(attacker, defender, true);
            if (!game.waitingTarget) return;
            if (shots === 0) {
                game.waitingTarget.shots = 1;
                addLog(`Первый выстрел выполнен. Выберите вторую цель (или отмените).`);
                render();
                return;
            } else {
                addLog(`Второй выстрел завершён.`);
                cancelTarget();
                attacker.noShootRest = true;
            }
        }
        else if (type === "block") {
            const ally = getShip(targetId);
            if (ally && ally.side === attacker.side) { ally.blockActive = true; addLog(`${ally.name} получает блокировку на 1 раунд!`); }
            cancelTarget();
        }
        else if (type === "push") {
            game.distance = Math.min(8, game.distance + 2);
            addLog(`Дистанция увеличена до ${game.distance}!`);
            cancelTarget();
        }
        
        afterAction();
        render();
    }
    
    function resolveAttack(attacker, defender, isDouble = false) {
        let damage = attacker.weapons;
        if (attacker.buffDamage) { damage += attacker.buffDamage; attacker.buffDamage = 0; }
        if (attacker.heavyShot && game.distance <= 3) damage += 1;
        if (attacker.class === "тяжелый" && game.distance <= 2) damage += 2;
        if (attacker.class === "средний" && game.distance === 2) damage *= 2;
        if (game.distance === 1 && Math.random() < 0.5) damage += 2;
        if (game.distance >= 4 && Math.random() < 0.5) { addLog(`Промах! Дистанция велика.`); return; }
        
        // Шанс двойного урона для Аккламатора
        if (attacker.name === "Аккламатор" && Math.random() < 0.2) { damage *= 2; addLog(`Критический урон! x2`); }
        
        let remaining = damage;
        if (!attacker.pierceActive && defender.shields > 0) {
            let absorbed = Math.min(defender.shields, remaining);
            defender.shields -= absorbed;
            remaining -= absorbed;
            addLog(`Щиты ${defender.name} поглотили ${absorbed} урона. Осталось щитов: ${defender.shields}`);
        }
        if (remaining > 0) {
            defender.hull -= remaining;
            addLog(`${attacker.name} наносит ${remaining} урона корпусу ${defender.name}. Корпус: ${defender.hull}`);
            if (defender.hull <= 0) addLog(`💀 ${defender.name} УНИЧТОЖЕН!`);
        }
        attacker.pierceActive = false;
        attacker.heavyShot = false;
        
        if (attacker.name === "Центакс" && game.distance <= 1 && defender.hull > 0) {
            defender.disabledMove = true;
            addLog(`${defender.name} не может двигаться в следующем ходу!`);
        }
    }
    
    function cancelTarget() {
        game.waitingTarget = null;
        render();
    }
    
    function afterAction() {
        checkRoundEnd();
        render();
    }
    
    // Принудительное завершение раунда
    function forceEndRound() {
        if (game.waitingTarget) { addLog("Сначала завершите текущее действие"); return; }
        game.ships.forEach(s => { if (s.hull > 0) s.energy = 0; });
        checkRoundEnd();
        render();
    }
    
    // Рендер
    function render() {
        document.getElementById("distanceValue").innerText = game.distance;
        document.getElementById("roundValue").innerText = game.round;
        
        const repDiv = document.getElementById("republicShips");
        const cisDiv = document.getElementById("cisShips");
        repDiv.innerHTML = "";
        cisDiv.innerHTML = "";
        
        game.ships.forEach(ship => {
            const card = document.createElement("div");
            card.className = `ship-card ${game.currentShipId === ship.id ? "active-ship" : ""} ${ship.hull <= 0 ? "disabled-ship" : ""}`;
            if (ship.hull > 0 && !game.waitingTarget) card.onclick = () => selectShip(ship.id);
            
            const systemsHtml = `
                <div class="systems-grid">
                    <div class="system ${ship.shields <= 0 ? 'broken' : ''}">🛡️ Щиты:<br>${ship.shields}/${ship.maxShields}</div>
                    <div class="system ${ship.weapons <= 0 ? 'broken' : ''}">🔫 Орудия:<br>${ship.weapons}/${ship.maxWeapons}</div>
                    <div class="system ${ship.engines <= 0 ? 'broken' : ''}">⚙️ Двигатели:<br>${ship.engines}/${ship.maxEngines}</div>
                    <div class="system ${ship.hull <= 0 ? 'broken' : ''}">🏗️ Корпус:<br>${ship.hull}/${ship.maxHull}</div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size:0.8rem;">
                    <span>⚡ Энергия: ${ship.energy}/${ship.maxEnergy}</span>
                    <span>📏 ${ship.class}</span>
                </div>
            `;
            
            card.innerHTML = `
                <div class="ship-name">
                    <span>${ship.name}</span>
                    <span class="energy-badge">❤️ ${ship.hull > 0 ? "активен" : "УНИЧТОЖЕН"}</span>
                </div>
                ${systemsHtml}
                <div class="action-buttons" id="actions-${ship.id}"></div>
            `;
            
            if (ship.hull > 0 && !game.waitingTarget && game.currentShipId === null && ship.energy > 0) {
                const actionsDiv = card.querySelector(`#actions-${ship.id}`);
                if (actionsDiv) {
                    const acts = ["Атаковать", "Маневр", "Прикрытие", "Обход", "Ремонт", "Спец.умение"];
                    acts.forEach(act => {
                        const btn = document.createElement("button");
                        btn.innerText = act;
                        btn.className = "action-btn";
                        btn.onclick = (e) => { e.stopPropagation(); performAction(ship.id, act); };
                        actionsDiv.appendChild(btn);
                    });
                }
            }
            
            if (ship.side === "rep") repDiv.appendChild(card);
            else cisDiv.appendChild(card);
        });
        
        // Если ожидание цели, подсвечиваем возможные цели
        if (game.waitingTarget) {
            document.querySelectorAll(".ship-card").forEach(card => {
                const nameSpan = card.querySelector(".ship-name span");
                if (nameSpan) {
                    const shipName = nameSpan.innerText;
                    const ship = game.ships.find(s => s.name === shipName);
                    if (ship && ship.hull > 0) {
                        const isEnemy = (game.waitingTarget.type === "attack" || game.waitingTarget.type === "disable" || game.waitingTarget.type === "doubleShot") 
                                    && ship.side !== getShip(game.waitingTarget.attackerId)?.side;
                        const isAlly = (game.waitingTarget.type === "cover" || game.waitingTarget.type === "coverAlly" || game.waitingTarget.type === "buffAlly" || game.waitingTarget.type === "block")
                                    && ship.side === getShip(game.waitingTarget.attackerId)?.side;
                        if (isEnemy || isAlly || game.waitingTarget.type === "repair") {
                            card.style.cursor = "pointer";
                            card.style.boxShadow = "0 0 0 2px gold";
                            card.onclick = () => resolveTarget(ship.id);
                        }
                    }
                }
            });
        }
    }
    
    // Инициализация
    function initGame() {
        game = {
            distance: 6,
            round: 1,
            ships: [],
            currentShipId: null,
            waitingTarget: null,
            logs: [],
            roundActive: true
        };
        
        let id = 1;
        for (let side of ["rep", "cis"]) {
            for (let shipName of FLEET_COMP[side]) {
                const data = SHIPS_DATA[shipName];
                if (data) {
                    game.ships.push({
                        id: id++,
                        name: shipName,
                        side: data.side,
                        class: data.class,
                        maxEnergy: data.maxEnergy,
                        energy: data.maxEnergy,
                        shields: data.shields,
                        maxShields: data.shields,
                        weapons: data.weapons,
                        maxWeapons: data.weapons,
                        engines: data.engines,
                        maxEngines: data.engines,
                        hull: data.hull,
                        maxHull: data.hull,
                        special: data.special ? { ...data.special, cd: 0 } : null,
                        passiveDesc: data.passive,
                        // временные эффекты
                        pierceActive: false,
                        heavyShot: false,
                        betterRepair: false,
                        underCover: false,
                        flankActive: false,
                        disabledMove: false,
                        buffDamage: 0,
                        noShootRest: false
                    });
                }
            }
        }
        addLog("⭐ БИТВА НАЧАЛАСЬ! Выберите корабль и действуйте. Да пребудет с вами Сила!");
        render();
    }
    
    document.getElementById("endRoundBtn").onclick = forceEndRound;
    document.getElementById("restartBtn").onclick = initGame;
    
    initGame();
</script>
</body>
</html>
